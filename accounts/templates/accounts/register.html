<!-- accounts/templates/accounts/register.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5 shadow">
                <div class="card-header text-center bg-success text-white">
                    <h3>用户注册</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <!-- 账号 -->
                        <div class="mb-3">
                            <label for="{{ form.username.id_for_label }}" class="form-label">{{ form.username.label }}</label>
                            {{ form.username }}
                            {% if form.username.errors %}
                                <div class="text-danger small mt-1">{{ form.username.errors.0 }}</div>
                            {% endif %}
                        </div>

                        <!-- 密码 -->
                        <div class="mb-3">
                            <label for="{{ form.password.id_for_label }}" class="form-label">{{ form.password.label }}</label>
                            {{ form.password }}
                        </div>

                        <!-- 确认密码 -->
                        <div class="mb-3">
                            <label for="{{ form.confirm_password.id_for_label }}" class="form-label">{{ form.confirm_password.label }}</label>
                            {{ form.confirm_password }}
                        </div>

                        <!-- 错误信息 -->
                        {% if form.non_field_errors %}
                            <div class="alert alert-danger">{{ form.non_field_errors.0 }}</div>
                        {% endif %}

                        <button type="submit" class="btn btn-success w-100">注 册</button>
                    </form>

                    <hr>
                    <div class="text-center">
                        <p class="mb-0">已有账号？<a href="{% url 'login' %}">立即登录</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
