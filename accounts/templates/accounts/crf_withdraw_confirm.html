{% extends "accounts/base.html" %}

{% block title %}撤回确认{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">撤回CRF提交</h1>
    </div>

    <div class="alert alert-warning">
        <h4 class="alert-heading">确认撤回</h4>
        <p>确定要撤回 "<strong>{{ crf.name }}</strong>" 的提交吗？</p>
        <hr>
        <p class="mb-0">撤回后已提交的数据将被永久删除，此操作不可撤销。</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">确认撤回</button>
        <a href="{% url 'user_dashboard' %}" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}
